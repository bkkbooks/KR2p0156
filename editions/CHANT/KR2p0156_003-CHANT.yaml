body:
  text: 三仁內也義外也禮樂共也內立父子夫也外立君臣婦也疏斬布絰杖為父也為君亦然疏衰齊牡麻絰為昆弟也為妻亦然袒免為宗族也為朋友亦然為父絕君不為君絕父為昆弟絕妻不為妻絕昆弟為宗族殺朋友不為朋友殺宗族人有六德三親不斷門內之治恩掩義門外之治義斬仁仁類萌而速義類止而絕仁萌而光義強而柬放之為言也猶放放也少而尞多也逸其志求養親之志害亡不以也是以放也
