body:
  text: 二雖在山岳之中苟賢能用之也賞慶焉知其以有所歸也材此親戚遠近唯其人所在得其人則舉焉不得其人則止也故曰父兄任者子弟大藝者大官小材藝者小官因而施祿焉使之足以生足以死謂之君以義使人多義者君德也非我血氣之親畜我如其子弟故曰苟濟夫人之善也勞其臟腑之力弗敢憚也危其死弗敢愛也謂之臣以忠事人多忠者臣德也知可為者知不可為者知行者知不行者是謂之夫以智率人多智也者夫德也能與之齊終身弗改之矣是故夫死有主終身不變謂之婦以信從人多也信也者婦德也既生畜之或從而教誨之謂之聖聖也者父德也子也者會埻長材以事上謂之義上恭下義以睦姻睦姻謂之孝故人則為人也謂之仁仁者子德也故夫夫婦婦父父子子君君臣臣六者各行其職而訕誇亡由作也觀諸詩書則亦在矣觀諸禮樂則亦在矣觀諸易春秋則亦在矣親此多也欽此多也美此多也道御之
