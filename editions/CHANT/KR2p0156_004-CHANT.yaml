body:
  text: 四男女辨生言父子親生言君臣義生言父聖子仁夫智婦信君義臣忠聖生仁智率信義使忠故夫夫婦婦父父子子君君臣臣此六者各行其職而訕誇蔑由作也君子言信言尔言煬言尔設外內皆得也其反夫不夫婦不婦父不父子不子君不君臣不臣昏所由作也君子不啻明乎民微而已或以知其一矣男女不辨父子不親父子不親君臣亡義是故先王之教民也始於孝弟君子於此一體者亡所法是故先王之教民也不使此民也憂其身失其體孝本也下修其本可以斷訕生民斯必有夫婦父子君臣君子明乎此六者然後可以斷訕道不可體也能守一曲焉可以諱其惡是以其斷訕速
